name: Ubuntu SSH Cloudflare

on:
  workflow_dispatch:

jobs:
  ssh-server:

    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:

    - name: Update Ubuntu
      run: |
        sudo apt update

    - name: Install SSH
      run: |
        sudo apt install -y openssh-server curl wget
        sudo systemctl start ssh

    - name: Set SSH Password
      run: |
        echo "runner:123456" | sudo chpasswd

    - name: Install Cloudflared
      run: |
        wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared-linux-amd64.deb

    - name: Start Cloudflare Tunnel
      run: |
        cloudflared tunnel --url ssh://localhost:22 > cloudflare.log 2>&1 &
        sleep 10
        cat cloudflare.log

    - name: Show SSH Info
      run: |
        echo "=============================="
        echo "SSH USER: runner"
        echo "SSH PASSWORD: 123456"
        echo "=============================="

    - name: Keep Alive
      run: |
        while true; do
          sleep 300
        done

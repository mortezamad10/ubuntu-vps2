name: Fast Ubuntu SSH Cloudflare Tunnel

on:
  workflow_dispatch:

jobs:
  ssh-server:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:

    - name: Install SSH + Cloudflared
      run: |
        sudo apt update -qq
        sudo apt install -y -qq openssh-server curl

        sudo service ssh start

        sudo useradd -m runner || true
        echo "runner:123456" | sudo chpasswd
        sudo usermod -aG sudo runner

        curl -L -o cloudflared \
        https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64

        chmod +x cloudflared
        sudo mv cloudflared /usr/local/bin/

    - name: Start Tunnel
      run: |
        nohup cloudflared tunnel run \
        --token ${{ secrets.CLOUDFLARE_TOKEN }} \
        >/tmp/cloudflared.log 2>&1 &

        sleep 3

    - name: Connection Info
      run: |
        echo "======================"
        echo "SSH READY"
        echo "======================"
        echo "Host: ssh.mortezavpn.qzz.io"
        echo "User: runner"
        echo "Pass: 123456"
        echo ""
        echo "Command:"
        echo "ssh runner@ssh.mortezavpn.qzz.io"
        echo "======================"

    - name: Keep Alive
      run: |
        while true; do sleep 300; done

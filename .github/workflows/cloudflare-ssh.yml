name: Fast Ubuntu SSH Cloudflare Tunnel

on:
  workflow_dispatch:

jobs:
  ssh-server:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:

    - name: Install SSH + Cloudflared
      run: |
        sudo apt update -qq
        sudo apt install -y -qq openssh-server curl

        sudo service ssh start

        # Create MORTEZA user
        sudo useradd -m MORTEZA || true
        echo "MORTEZA:1202" | sudo chpasswd
        sudo usermod -aG sudo MORTEZA

        # Install cloudflared
        curl -L -o cloudflared \
        https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64

        chmod +x cloudflared
        sudo mv cloudflared /usr/local/bin/

    - name: Start Cloudflare Tunnel
      run: |
        nohup cloudflared tunnel run \
        --token ${{ secrets.CLOUDFLARE_TOKEN }} \
        >/tmp/cloudflared.log 2>&1 &

        sleep 3

    - name: Show SSH Info
      run: |
        echo "=============================="
        echo "SSH READY"
        echo "=============================="
        echo "Username: MORTEZA"
        echo "Password: 1202"
        echo ""
        echo "SSH Command:"
        echo 'ssh -o StrictHostKeyChecking=no -o ProxyCommand="cloudflared access ssh --hostname %h" MORTEZA@ssh.mortezavpn.qzz.io'
        echo "=============================="

    - name: Keep Alive
      run: |
        while true; do sleep 300; done

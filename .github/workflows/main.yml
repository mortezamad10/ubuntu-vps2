name: Ubuntu SSH + Tailscale

on:
  workflow_dispatch:

jobs:
  ssh:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Install SSH
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl
          sudo systemctl enable ssh
          sudo systemctl start ssh

      - name: Set Password
        run: |
          echo "runner:123456" | sudo chpasswd

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Login to Tailscale
        run: |
          sudo tailscale up \
            --authkey="${{ secrets.TAILSCALE_AUTHKEY }}" \
            --ssh

      - name: Show Connection Info
        run: |
          echo "==============================="
          echo "SSH READY"
          echo "==============================="
          echo "Username : runner"
          echo "Password : 123456"
          echo ""
          echo "Tailscale IP:"
          tailscale ip -4
          echo ""
          echo "SSH Command:"
          echo "ssh runner@$(tailscale ip -4)"
          echo ""
          echo "Status:"
          tailscale status
          echo "==============================="

      - name: Keep Alive
        run: |
          while true; do
            sleep 300
          done
